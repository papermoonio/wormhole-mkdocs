name: Update llms.txt (Test)

on:
  push:
    branches:
      - ilariae/llms-sript
jobs:
  update-llms:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '22' 

      - name: Install dependencies
        run: npm install
        working-directory: ./scripts

      - name: Generate llms.txt
        run: node src/generate-llms.js
        working-directory: ./scripts

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Check if llms.txt changed
          if git diff --name-only | grep -q '^llms.txt$'; then
            git add llms.txt
            git commit -m "ci: update llms.txt"
            git push origin ilariae/llms-sript
          else
            echo "No changes to llms.txt."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
